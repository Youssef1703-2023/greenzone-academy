databases:
  - name: greenzone-academy-db
    databaseName: greenzone_academy
    user: greenzone_academy

services:
  - type: web
    name: greenzone-academy-api
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run deploy:prepare
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: greenzone-academy-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://greenzone-academy.tech
      - key: TRANSLATION_PROVIDER
        value: libretranslate
      - key: LIBRETRANSLATE_URL
        sync: false
      - key: LIBRETRANSLATE_API_KEY
        sync: false
      - key: GOOGLE_TRANSLATE_API_KEY
        sync: false
      - key: GOOGLE_TRANSLATE_PROJECT_ID
        sync: false

  - type: web
    name: greenzone-academy-web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://api.greenzone-academy.tech/api
